  <main class="section search-section">
    <h2>Search Estimate Requests</h2>

    <p>
      Use the email address from a submitted estimate request to search for customer
      project information stored in the Chevron Tile Inc. database.
    </p>

    <form action="/search-estimate" method="GET" onsubmit="return validateSearchForm()" class="search-form">
      <input type="email" name="email" id="search_email" placeholder="Enter customer email address">
      <button type="submit" class="btn btn-primary">Search Request</button>
    </form>
  </main>
